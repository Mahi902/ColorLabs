<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Color Chooser</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{
  font-family:'Quicksand',sans-serif;
  font-size:14px;
  width:100%;
  min-height:100%;
  overflow-x:hidden;
}

/* ── Theme variables ── */
:root{
  --bg:#ffffff;
  --bg2:#f4f4f5;
  --bg3:#e4e4e7;
  --border:#e4e4e7;
  --text:#18181b;
  --text2:#71717a;
  --text3:#a1a1aa;
  --accent:#2196f3;
  --accent-bg:#e3f2fd;
  --accent-hover:#1976d2;
  --apply-bg:#2196f3;
  --apply-hover:#1565c0;
  --cancel-bg:#f4f4f5;
  --cancel-text:#52525b;
  --cancel-hover:#e4e4e7;
  --shadow:0 2px 16px rgba(0,0,0,.08);
  --shadow2:0 4px 24px rgba(0,0,0,.13);
}
.dark{
  --bg:#09090b;
  --bg2:#18181b;
  --bg3:#27272a;
  --border:#27272a;
  --text:#fafafa;
  --text2:#a1a1aa;
  --text3:#52525b;
  --accent:#42a5f5;
  --accent-bg:#172035;
  --accent-hover:#64b5f6;
  --apply-bg:#1976d2;
  --apply-hover:#1565c0;
  --cancel-bg:#27272a;
  --cancel-text:#a1a1aa;
  --cancel-hover:#3f3f46;
  --shadow:0 2px 16px rgba(0,0,0,.4);
  --shadow2:0 4px 24px rgba(0,0,0,.5);
}

body{background:var(--bg);color:var(--text);}

/* ── Main wrapper ── */
.cc-wrap{
  display:flex;flex-direction:column;
  min-height:100dvh;
}

/* ── Header ── */
.cc-header{
  padding:14px 16px 10px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
  animation:slideDown .3s cubic-bezier(.22,.68,0,1.2) both;
}
.cc-title{
  font-size:15px;font-weight:700;
  color:var(--text);
  display:flex;align-items:center;gap:7px;
}
.cc-title .material-symbols-rounded{
  font-size:19px;color:var(--accent);
  animation:spinIn .5s cubic-bezier(.22,.68,0,1.2) both .1s;
}

.cc-current{
  margin-top:8px;
  padding:9px 12px;
  background:var(--bg2);
  border-radius:12px;
  border:1px solid var(--border);
  display:flex;align-items:center;gap:10px;
  font-size:12px;font-weight:600;color:var(--text2);
  animation:fadeSlideUp .3s ease both .15s;
}
.cc-current-swatch{
  width:26px;height:26px;border-radius:8px;
  border:2px solid var(--border);flex-shrink:0;
}
.cc-current-code{font-family:monospace;color:var(--text);font-size:13px;}

/* ── Body scrollable area ── */
.cc-body{
  flex:1;
  overflow-y:auto;overflow-x:hidden;
  scrollbar-width:thin;
  scrollbar-color:var(--border) transparent;
  padding:10px 12px;
  display:flex;flex-direction:column;gap:10px;
}
.cc-body::-webkit-scrollbar{width:4px;}
.cc-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
.cc-body::-webkit-scrollbar-track{background:transparent;}

/* ── View: grid of main colors ── */
.cc-section-label{
  font-size:10px;font-weight:700;
  text-transform:uppercase;letter-spacing:.6px;
  color:var(--text3);margin-bottom:7px;
  animation:fadeSlideUp .3s ease both .1s;
}

.cc-main-grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:6px;
}
.cc-main-item{
  aspect-ratio:1;border-radius:10px;
  cursor:pointer;
  border:2px solid transparent;
  transition:transform .18s cubic-bezier(.22,.68,0,1.4),border-color .15s,box-shadow .15s,opacity .15s;
  position:relative;
  overflow:hidden;
  opacity:0;
  animation:popIn .35s cubic-bezier(.22,.68,0,1.4) both;
}
.cc-main-item:hover{transform:scale(1.09);box-shadow:var(--shadow2);}
.cc-main-item:active{transform:scale(.96);}
.cc-main-item.active{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-bg);}
.cc-main-item-label{
  position:absolute;bottom:0;left:0;right:0;
  text-align:center;font-size:9px;font-weight:700;
  padding:2px 0 3px;
  background:rgba(0,0,0,.35);
  color:#fff;
  letter-spacing:.3px;
  transform:translateY(100%);
  transition:transform .18s ease;
}
.cc-main-item:hover .cc-main-item-label{transform:translateY(0);}

/* ── View: shades of a color ── */
.cc-shades-back{
  display:inline-flex;align-items:center;gap:4px;
  background:none;border:none;cursor:pointer;
  font-size:12px;font-weight:700;color:var(--accent);
  font-family:inherit;padding:2px 0 6px;
  transition:opacity .15s,transform .15s;
}
.cc-shades-back:hover{opacity:.75;}
.cc-shades-back:active{transform:translateX(-3px);}
.cc-shades-back .material-symbols-rounded{font-size:16px;}

.cc-shades-grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:6px;
}
.cc-shade-item{
  aspect-ratio:1;border-radius:10px;
  cursor:pointer;
  border:2px solid transparent;
  transition:transform .18s cubic-bezier(.22,.68,0,1.4),border-color .15s,box-shadow .15s;
  position:relative;
  overflow:hidden;
  opacity:0;
  animation:popIn .3s cubic-bezier(.22,.68,0,1.4) both;
}
.cc-shade-item:hover{transform:scale(1.09);box-shadow:var(--shadow2);}
.cc-shade-item:active{transform:scale(.96);}
.cc-shade-item.selected{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-bg);}
.cc-shade-check{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  font-family:'Material Symbols Rounded',sans-serif;
  font-size:16px;color:#fff;
  text-shadow:0 1px 3px rgba(0,0,0,.5);
  opacity:0;transition:opacity .15s,transform .2s cubic-bezier(.22,.68,0,1.4);
  transform:scale(.5);
}
.cc-shade-item.selected .cc-shade-check{opacity:1;transform:scale(1);}

/* ── Advanced mode ── */
.cc-adv-toggle{
  display:inline-flex;align-items:center;gap:6px;
  background:none;border:none;cursor:pointer;
  font-size:12px;font-weight:700;color:var(--text2);
  font-family:inherit;padding:4px 0;
  transition:color .15s;
}
.cc-adv-toggle:hover{color:var(--accent);}
.cc-adv-toggle .material-symbols-rounded{font-size:16px;transition:transform .25s;}
.cc-adv-toggle.open .material-symbols-rounded:last-child{transform:rotate(180deg);}

.cc-adv-panel{
  max-height:0;overflow:hidden;
  padding:0 12px;
  background:var(--bg2);
  border-radius:14px;
  border:1px solid transparent;
  margin-top:6px;
  display:flex;
  flex-direction:column;
  gap:12px;
  transition:max-height .4s cubic-bezier(.22,.68,0,1),
             padding .3s ease,
             border-color .3s ease,
             opacity .25s ease;
  opacity:0;
}
.cc-adv-panel.open{
  max-height:600px;
  padding:12px;
  border-color:var(--border);
  opacity:1;
}

.cc-adv-label{font-size:11px;font-weight:700;color:var(--text2);margin-bottom:4px;}

/* Hue slider */
.cc-hue-track{
  height:12px;border-radius:999px;
  background:linear-gradient(to right,
    hsl(0,100%,50%),hsl(30,100%,50%),hsl(60,100%,50%),
    hsl(90,100%,50%),hsl(120,100%,50%),hsl(150,100%,50%),
    hsl(180,100%,50%),hsl(210,100%,50%),hsl(240,100%,50%),
    hsl(270,100%,50%),hsl(300,100%,50%),hsl(330,100%,50%),hsl(360,100%,50%));
  position:relative;cursor:pointer;
  margin-bottom:8px;
}
.cc-hue-thumb{
  width:18px;height:18px;
  border-radius:50%;border:3px solid #fff;
  box-shadow:0 1px 6px rgba(0,0,0,.3);
  position:absolute;top:50%;transform:translate(-50%,-50%);
  cursor:grab;transition:box-shadow .15s,transform .1s;
  pointer-events:none;
}
.cc-hue-track:active .cc-hue-thumb{transform:translate(-50%,-50%) scale(1.2);}

/* SV square */
.cc-sv-wrap{
  width:100%;aspect-ratio:1.6;position:relative;
  border-radius:10px;overflow:hidden;cursor:crosshair;
  margin-bottom:8px;
  box-shadow:inset 0 0 0 1px rgba(0,0,0,.12);
}
.cc-sv-wrap canvas{display:block;width:100%;height:100%;}
.cc-sv-thumb{
  width:14px;height:14px;border-radius:50%;
  border:2.5px solid #fff;box-shadow:0 1px 5px rgba(0,0,0,.4);
  position:absolute;transform:translate(-50%,-50%);
  pointer-events:none;
  transition:transform .1s;
}

/* Hex input */
.cc-hex-row{
  display:flex;align-items:center;gap:8px;
}
.cc-hex-swatch{
  width:32px;height:32px;border-radius:9px;
  border:2px solid var(--border);flex-shrink:0;
  transition:background .2s;
}
.cc-hex-inp{
  flex:1;padding:7px 10px;
  border:1.5px solid var(--border);
  border-radius:9px;background:var(--bg);color:var(--text);
  font-size:13px;font-family:monospace;font-weight:600;
  outline:none;transition:border-color .15s,box-shadow .15s;
  text-transform:uppercase;
}
.cc-hex-inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-bg);}
.cc-hex-go{
  padding:7px 12px;border-radius:9px;
  background:var(--accent);color:#fff;
  border:none;cursor:pointer;font-size:12px;font-weight:700;
  font-family:inherit;transition:background .15s,transform .1s;white-space:nowrap;
}
.cc-hex-go:hover{background:var(--apply-hover);}
.cc-hex-go:active{transform:scale(.95);}

/* ── Selected preview strip ── */
.cc-preview-outer{
  padding:0 12px 8px;
  flex-shrink:0;
  animation:fadeSlideUp .28s ease both;
}
.cc-preview-strip{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;
  background:var(--bg2);
  border-radius:12px;
  border:1px solid var(--border);
}
.cc-preview-swatch{
  width:36px;height:36px;border-radius:10px;
  border:2px solid var(--border);flex-shrink:0;
  transition:background .25s cubic-bezier(.22,.68,0,1.2),transform .2s;
}
.cc-preview-info{flex:1;min-width:0;}
.cc-preview-code{
  font-family:monospace;font-size:14px;font-weight:700;
  color:var(--text);letter-spacing:.5px;
}
.cc-preview-sub{font-size:11px;color:var(--text2);margin-top:1px;}

/* ── Footer ── */
.cc-footer{
  padding:10px 12px 12px;
  border-top:1px solid var(--border);
  flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  gap:8px;
  animation:slideUp .3s cubic-bezier(.22,.68,0,1.2) both .05s;
  position:sticky;bottom:0;
  background:var(--bg);
  z-index:10;
}

.cc-brand{
  display:flex;align-items:center;gap:5px;
  text-decoration:none;opacity:.6;transition:opacity .15s,transform .2s;
  flex-shrink:0;
}
.cc-brand:hover{opacity:1;transform:scale(1.05);}
.cc-brand img{width:100px;height:100px;border-radius:5px;object-fit:contain;}

.cc-footer-btns{
  display:flex;align-items:center;gap:8px;
}
.cc-btn{
  padding:9px 20px;border-radius:12px;
  border:none;cursor:pointer;
  font-size:13px;font-weight:700;font-family:inherit;
  transition:background .15s,transform .12s cubic-bezier(.22,.68,0,1.4),box-shadow .15s;
}
.cc-btn:active{transform:scale(.95);}
.cc-btn-cancel{
  background:var(--cancel-bg);color:var(--cancel-text);
}
.cc-btn-cancel:hover{background:var(--cancel-hover);}
.cc-btn-apply{
  background:var(--apply-bg);color:#fff;
  box-shadow:0 2px 8px rgba(33,150,243,.25);
}
.cc-btn-apply:hover{background:var(--apply-hover);box-shadow:0 4px 16px rgba(33,150,243,.35);}

/* ── Animations ── */
@keyframes slideDown{
  from{opacity:0;transform:translateY(-12px)}
  to{opacity:1;transform:none}
}
@keyframes slideUp{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:none}
}
@keyframes fadeSlideUp{
  from{opacity:0;transform:translateY(8px)}
  to{opacity:1;transform:none}
}
@keyframes popIn{
  from{opacity:0;transform:scale(.7)}
  to{opacity:1;transform:scale(1)}
}
@keyframes spinIn{
  from{opacity:0;transform:rotate(-90deg) scale(.5)}
  to{opacity:1;transform:rotate(0) scale(1)}
}
@keyframes swatchPop{
  0%{transform:scale(1)}
  40%{transform:scale(1.18)}
  100%{transform:scale(1)}
}
.swatch-pop{animation:swatchPop .25s cubic-bezier(.22,.68,0,1.4) both;}

/* ── View transitions ── */
.cc-view-enter{animation:fadeSlideUp .2s ease both;}
.cc-view-leave{animation:fadeLeave .15s ease both;}
@keyframes fadeLeave{
  from{opacity:1;transform:none}
  to{opacity:0;transform:translateY(-4px)}
}

/* ── Small screen UX extras ── */
@media(max-width:480px){
  .cc-main-grid,.cc-shades-grid{
    grid-template-columns:repeat(4,1fr);
    gap:8px;
  }
  .cc-main-item,.cc-shade-item{
    border-radius:12px;
  }
  .cc-btn{padding:10px 16px;}
  .cc-preview-code{font-size:13px;}
}
@media(max-width:340px){
  .cc-main-grid,.cc-shades-grid{
    grid-template-columns:repeat(3,1fr);
    gap:7px;
  }
}

/* ── No chosen state ── */
.cc-no-selection{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:6px;padding:16px;
  color:var(--text3);text-align:center;
}
.cc-no-selection .material-symbols-rounded{font-size:28px;}
.cc-no-selection span{font-size:12px;font-weight:600;}
</style>
</head>
<body>

<div class="cc-wrap" id="ccWrap">

  <!-- Header -->
  <div class="cc-header">
    <div class="cc-title">
      <span class="material-symbols-rounded">palette</span>
      Choose a color
    </div>
    <div class="cc-current" id="ccCurrentBar" style="display:none;">
      <div class="cc-current-swatch" id="ccCurrentSwatch"></div>
      <div>
        <div class="cc-current-code" id="ccCurrentCode"></div>
        <div style="font-size:11px;color:var(--text2);margin-top:1px;">is the current color</div>
      </div>
    </div>
  </div>

  <!-- Body -->
  <div class="cc-body" id="ccBody">

    <!-- View: Main colors -->
    <div id="view-main" class="cc-view">
      <div class="cc-section-label">Select a color family</div>
      <div class="cc-main-grid" id="mainGrid"></div>
    </div>

    <!-- View: Shades (hidden by default) -->
    <div id="view-shades" class="cc-view" style="display:none;">
      <button class="cc-shades-back" id="backBtn" onclick="showMainView()">
        <span class="material-symbols-rounded">arrow_back</span>
        <span id="backLabel">All Colors</span>
      </button>
      <div class="cc-section-label" id="shadesLabel">Pick a shade</div>
      <div class="cc-shades-grid" id="shadesGrid"></div>
    </div>

  </div>

  <!-- Preview strip (shown once a shade is chosen) -->
  <div class="cc-preview-outer" id="ccPreviewStrip" style="display:none;">
    <div class="cc-preview-strip">
      <div class="cc-preview-swatch" id="previewSwatch"></div>
      <div class="cc-preview-info">
        <div class="cc-preview-code" id="previewCode">#000000</div>
        <div class="cc-preview-sub">Selected color</div>
      </div>
    </div>
    <!-- Advanced toggle -->
    <button class="cc-adv-toggle" id="advToggle" onclick="toggleAdvanced()">
      <span class="material-symbols-rounded">tune</span>
      Advanced
      <span class="material-symbols-rounded" style="margin-left:auto;font-size:14px">expand_more</span>
    </button>
    <div class="cc-adv-panel" id="advPanel">
      <!-- Hue -->
      <div>
        <div class="cc-adv-label">Hue</div>
        <div class="cc-hue-track" id="hueTrack">
          <div class="cc-hue-thumb" id="hueThumb"></div>
        </div>
      </div>
      <!-- SV -->
      <div>
        <div class="cc-adv-label">Saturation &amp; Brightness</div>
        <div class="cc-sv-wrap" id="svWrap">
          <canvas id="svCanvas"></canvas>
          <div class="cc-sv-thumb" id="svThumb"></div>
        </div>
      </div>
      <!-- Hex -->
      <div>
        <div class="cc-adv-label">Hex Code</div>
        <div class="cc-hex-row">
          <div class="cc-hex-swatch" id="hexSwatch"></div>
          <input class="cc-hex-inp" id="hexInp" type="text" maxlength="7" placeholder="#1976d2" spellcheck="false">
          <button class="cc-hex-go" onclick="applyHexInput()">Apply</button>
        </div>
        <button class="cc-adv-toggle" style="margin-top:8px;font-size:11px;" onclick="hideAdvanced()">
          <span class="material-symbols-rounded">close</span>
          Simple mode
        </button>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="cc-footer">
    <a class="cc-brand" href="https://mahi902.github.io/ColorLabs/" target="_blank" title="Color Labs" id="brandLink">
      <img src="https://mahi902.github.io/ColorLabs/asset/001.png" alt="Color Labs" id="brandImg">
    </a>
    <div class="cc-footer-btns">
      <button class="cc-btn cc-btn-cancel" onclick="doCancel()">Cancel</button>
      <button class="cc-btn cc-btn-apply" id="applyBtn" onclick="doApply()">Apply</button>
    </div>
  </div>

</div>

<script>
// ── State ──
let _colors = [];
let _selectedColor = null;
let _currentColor = null;
let _hue = 0, _sat = 1, _val = 1;
let _advOpen = false;

// ── Inline color data (no external JSON needed) ──
const INLINE_COLORS = [

  {id:'deep_purple',label:'Deep Purple',base:'#673ab7',shades:['#ede7f6','#d1c4e9','#b39ddb','#9575cd','#7e57c2','#673ab7','#5e35b1','#512da8','#4527a0','#311b92']},
  {id:'indigo',label:'Indigo',base:'#3f51b5',shades:['#e8eaf6','#c5cae9','#9fa8da','#7986cb','#5c6bc0','#3f51b5','#3949ab','#303f9f','#283593','#1a237e']},

  {id:'light_blue',label:'Light Blue',base:'#03a9f4',shades:['#e1f5fe','#b3e5fc','#81d4fa','#4fc3f7','#29b6f6','#03a9f4','#039be5','#0288d1','#0277bd','#01579b']},
  {id:'cyan',label:'Cyan',base:'#00bcd4',shades:['#e0f7fa','#b2ebf2','#80deea','#4dd0e1','#26c6da','#00bcd4','#00acc1','#0097a7','#00838f','#006064']},
  {id:'teal',label:'Teal',base:'#009688',shades:['#e0f2f1','#b2dfdb','#80cbc4','#4db6ac','#26a69a','#009688','#00897b','#00796b','#00695c','#004d40']},
  {id:'green',label:'Green',base:'#388e3c',shades:['#e8f5e9','#c8e6c9','#a5d6a7','#81c784','#66bb6a','#4caf50','#43a047','#388e3c','#2e7d32','#1b5e20']},
  {id:'light_green',label:'Light Green',base:'#7cb342',shades:['#f1f8e9','#dcedc8','#c5e1a5','#aed581','#9ccc65','#8bc34a','#7cb342','#689f38','#558b2f','#33691e']},
  {id:'lime',label:'Lime',base:'#afb42b',shades:['#f9fbe7','#f0f4c3','#e6ee9c','#dce775','#d4e157','#cddc39','#c0ca33','#afb42b','#9e9d24','#827717']},
  {id:'yellow',label:'Yellow',base:'#f9a825',shades:['#fffde7','#fff9c4','#fff59d','#fff176','#ffee58','#ffeb3b','#fdd835','#f9a825','#f57f17','#e65100']},
  {id:'amber',label:'Amber',base:'#ffa000',shades:['#fff8e1','#ffecb3','#ffe082','#ffd54f','#ffca28','#ffc107','#ffb300','#ffa000','#ff8f00','#ff6f00']},
  {id:'orange',label:'Orange',base:'#f57c00',shades:['#fff3e0','#ffe0b2','#ffcc80','#ffb74d','#ffa726','#ff9800','#fb8c00','#f57c00','#ef6c00','#e65100']},
  {id:'deep_orange',label:'Deep Orange',base:'#e64a19',shades:['#fbe9e7','#ffccbc','#ffab91','#ff8a65','#ff7043','#ff5722','#f4511e','#e64a19','#d84315','#bf360c']},
  {id:'brown',label:'Brown',base:'#795548',shades:['#efebe9','#d7ccc8','#bcaaa4','#a1887f','#8d6e63','#795548','#6d4c41','#5d4037','#4e342e','#3e2723']},
  {id:'grey',label:'Grey',base:'#757575',shades:['#fafafa','#f5f5f5','#eeeeee','#e0e0e0','#bdbdbd','#9e9e9e','#757575','#616161','#424242','#212121']},
  {id:'blue_grey',label:'Blue Grey',base:'#607d8b',shades:['#eceff1','#cfd8dc','#b0bec5','#90a4ae','#78909c','#607d8b','#546e7a','#455a64','#37474f','#263238']},
  {id:'black',label:'Black/White',base:'#000000',shades:['#ffffff','#f5f5f5','#e0e0e0','#bdbdbd','#757575','#616161','#424242','#212121','#111111','#000000']}
];

// ── Init ──
(function init(){
  parseHash();
  applyTheme();
  _colors = INLINE_COLORS;
  renderMainGrid();
  if(_currentColor){
    showCurrentBar(_currentColor);
    updatePreviewStrip(_currentColor);
  }
})();

function parseHash(){
  const parts = location.hash.replace('#','').split('|');
  const map = {};
  parts.forEach(p=>{
    const eq = p.indexOf('=');
    if(eq>0) map[p.slice(0,eq)] = p.slice(eq+1);
  });
  if(map.theme === 'dark') document.body.classList.add('dark');
  else if(map.theme === 'light') document.body.classList.remove('dark');
  if(map.currentcolor){
    let c = decodeURIComponent(map.currentcolor);
    if(!c.startsWith('#')) c = '#'+c;
    _currentColor = c;
    _selectedColor = c;
  }
}

function applyTheme(){
  const parts = location.hash.replace('#','').split('|');
  const hasTheme = parts.some(p=>p.startsWith('theme='));
  if(!hasTheme){
    try{
      const m = parent.document.cookie.split('; ').find(r=>r.startsWith('toolsuite_theme='));
      if(m && m.split('=')[1]==='dark') document.body.classList.add('dark');
    }catch(e){}
  }
}

function showCurrentBar(hex){
  const bar = document.getElementById('ccCurrentBar');
  bar.style.display = 'flex';
  document.getElementById('ccCurrentSwatch').style.background = hex;
  document.getElementById('ccCurrentCode').textContent = hex.toUpperCase();
}

function renderMainGrid(){
  const grid = document.getElementById('mainGrid');
  grid.innerHTML = '';
  _colors.forEach((c,i)=>{
    const el = document.createElement('div');
    el.className = 'cc-main-item';
    el.style.background = c.base;
    el.style.animationDelay = (i * 30) + 'ms';
    el.title = c.label;
    el.innerHTML = `<div class="cc-main-item-label">${c.label}</div>`;
    el.onclick = ()=>showShades(c);
    grid.appendChild(el);
  });
}

function showMainView(){
  const sv = document.getElementById('view-shades');
  sv.classList.add('cc-view-leave');
  setTimeout(()=>{
    sv.style.display = 'none';
    sv.classList.remove('cc-view-leave');
    const mv = document.getElementById('view-main');
    mv.style.display = '';
    mv.classList.add('cc-view-enter');
    setTimeout(()=>mv.classList.remove('cc-view-enter'), 200);
  }, 140);
}

function showShades(colorObj){
  const mv = document.getElementById('view-main');
  mv.classList.add('cc-view-leave');
  setTimeout(()=>{
    mv.style.display = 'none';
    mv.classList.remove('cc-view-leave');
    const sv = document.getElementById('view-shades');
    sv.style.display = '';
    sv.classList.add('cc-view-enter');
    setTimeout(()=>sv.classList.remove('cc-view-enter'), 200);

    document.getElementById('backLabel').textContent = 'All Colors';
    document.getElementById('shadesLabel').textContent = colorObj.label + ' — pick a shade';

    const grid = document.getElementById('shadesGrid');
    grid.innerHTML = '';
    colorObj.shades.forEach((hex,i)=>{
      const el = document.createElement('div');
      el.className = 'cc-shade-item' + (hex.toLowerCase()===(_selectedColor||'').toLowerCase()?' selected':'');
      el.style.background = hex;
      el.style.animationDelay = (i * 25) + 'ms';
      el.title = hex;
      el.innerHTML = `<div class="cc-shade-check">check</div>`;
      el.onclick = ()=>selectShade(hex, el);
      grid.appendChild(el);
    });
  }, 130);
}

function selectShade(hex, el){
  document.querySelectorAll('.cc-shade-item').forEach(s=>s.classList.remove('selected'));
  el.classList.add('selected');
  _selectedColor = hex;
  updatePreviewStrip(hex);
  const hsv = hexToHsv(hex);
  _hue = hsv.h; _sat = hsv.s; _val = hsv.v;
  if(_advOpen) renderAdvanced();
}

function updatePreviewStrip(hex){
  const strip = document.getElementById('ccPreviewStrip');
  const swatch = document.getElementById('previewSwatch');
  if(strip.style.display === 'none'){
    strip.style.display = '';
  }
  // Animate swatch
  swatch.classList.remove('swatch-pop');
  void swatch.offsetWidth;
  swatch.classList.add('swatch-pop');

  swatch.style.background = hex;
  document.getElementById('previewCode').textContent = hex.toUpperCase();
  document.getElementById('hexInp').value = hex.toUpperCase();
  document.getElementById('hexSwatch').style.background = hex;
}

// ── Advanced picker ──
function toggleAdvanced(){
  _advOpen = !_advOpen;
  const panel = document.getElementById('advPanel');
  const toggle = document.getElementById('advToggle');
  panel.classList.toggle('open', _advOpen);
  toggle.classList.toggle('open', _advOpen);
  if(_advOpen){
    if(_selectedColor){
      const hsv = hexToHsv(_selectedColor);
      _hue = hsv.h; _sat = hsv.s; _val = hsv.v;
    }
    // Small delay so panel is visible before drawing canvas
    setTimeout(()=>{
      renderAdvanced();
      bindAdvancedEvents();
    }, 50);
  }
}

function hideAdvanced(){
  _advOpen = false;
  document.getElementById('advPanel').classList.remove('open');
  document.getElementById('advToggle').classList.remove('open');
}

function renderAdvanced(){
  const hueThumb = document.getElementById('hueThumb');
  hueThumb.style.left = (_hue/360*100)+'%';

  const wrap = document.getElementById('svWrap');
  const canvas = document.getElementById('svCanvas');
  const w = wrap.offsetWidth||200, h = wrap.offsetHeight||125;
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');
  const gH = ctx.createLinearGradient(0,0,w,0);
  gH.addColorStop(0,'#fff');
  gH.addColorStop(1,`hsl(${_hue},100%,50%)`);
  ctx.fillStyle = gH;
  ctx.fillRect(0,0,w,h);
  const gV = ctx.createLinearGradient(0,0,0,h);
  gV.addColorStop(0,'rgba(0,0,0,0)');
  gV.addColorStop(1,'rgba(0,0,0,1)');
  ctx.fillStyle = gV;
  ctx.fillRect(0,0,w,h);

  const svThumb = document.getElementById('svThumb');
  svThumb.style.left = (_sat*100)+'%';
  svThumb.style.top = ((1-_val)*100)+'%';
}

function bindAdvancedEvents(){
  const hueTrack = document.getElementById('hueTrack');
  function onHueDrag(e){
    const rect = hueTrack.getBoundingClientRect();
    const cx = (e.touches?e.touches[0].clientX:e.clientX);
    _hue = Math.max(0,Math.min(360,(cx-rect.left)/rect.width*360));
    updateFromHsv();
  }
  hueTrack.onmousedown = e=>{e.preventDefault();onHueDrag(e);document.onmousemove=onHueDrag;document.onmouseup=()=>{document.onmousemove=null;};};
  hueTrack.ontouchstart = e=>{onHueDrag(e);document.ontouchmove=onHueDrag;document.ontouchend=()=>{document.ontouchmove=null;};};

  const svWrap = document.getElementById('svWrap');
  function onSvDrag(e){
    const rect = svWrap.getBoundingClientRect();
    const cx = (e.touches?e.touches[0].clientX:e.clientX);
    const cy = (e.touches?e.touches[0].clientY:e.clientY);
    _sat = Math.max(0,Math.min(1,(cx-rect.left)/rect.width));
    _val = Math.max(0,Math.min(1,1-(cy-rect.top)/rect.height));
    updateFromHsv();
  }
  svWrap.onmousedown = e=>{e.preventDefault();onSvDrag(e);document.onmousemove=onSvDrag;document.onmouseup=()=>{document.onmousemove=null;};};
  svWrap.ontouchstart = e=>{onSvDrag(e);document.ontouchmove=onSvDrag;document.ontouchend=()=>{document.ontouchmove=null;};};

  const hexInp = document.getElementById('hexInp');
  hexInp.oninput = ()=>{
    let v = hexInp.value.trim();
    if(!v.startsWith('#'))v='#'+v;
    document.getElementById('hexSwatch').style.background = v;
    if(/^#[0-9a-fA-F]{6}$/.test(v)){
      const hsv = hexToHsv(v);
      _hue=hsv.h;_sat=hsv.s;_val=hsv.v;
      _selectedColor=v.toUpperCase();
      updatePreviewStrip(v);
      renderAdvanced();
    }
  };
}

function applyHexInput(){
  let v = document.getElementById('hexInp').value.trim();
  if(!v.startsWith('#'))v='#'+v;
  if(/^#[0-9a-fA-F]{6}$/.test(v)){
    _selectedColor = v.toUpperCase();
    const hsv = hexToHsv(v);
    _hue=hsv.h;_sat=hsv.s;_val=hsv.v;
    updatePreviewStrip(v);
    renderAdvanced();
    document.querySelectorAll('.cc-shade-item').forEach(el=>{
      el.classList.toggle('selected', el.title.toLowerCase()===v.toLowerCase());
    });
  }
}

function updateFromHsv(){
  const hex = hsvToHex(_hue,_sat,_val);
  _selectedColor = hex;
  updatePreviewStrip(hex);
  renderAdvanced();
  document.querySelectorAll('.cc-shade-item').forEach(el=>{
    el.classList.toggle('selected', el.title.toLowerCase()===hex.toLowerCase());
  });
}

// ── Actions ──
function doCancel(){
  history.replaceState(null,'','#cancelled');
  try{
    if(parent && parent !== window) parent.postMessage({type:'cc-cancelled'},'*');
  }catch(e){}
}

function doApply(){
  if(!_selectedColor) return;
  const code = _selectedColor.startsWith('#')?_selectedColor:'#'+_selectedColor;
  history.replaceState(null,'','#applied'+code);
  try{
    if(parent && parent !== window) parent.postMessage({type:'cc-applied',color:code},'*');
  }catch(e){}
}

// ── Resize: redraw advanced if open ──
const ro = new ResizeObserver(()=>{
  if(_advOpen) renderAdvanced();
});
ro.observe(document.getElementById('ccWrap'));

// ── Color math ──
function hexToHsv(hex){
  let r=parseInt(hex.slice(1,3),16)/255,
      g=parseInt(hex.slice(3,5),16)/255,
      b=parseInt(hex.slice(5,7),16)/255;
  const max=Math.max(r,g,b),min=Math.min(r,g,b),d=max-min;
  let h=0,s=max===0?0:d/max,v=max;
  if(d!==0){
    switch(max){
      case r:h=((g-b)/d+(g<b?6:0))/6;break;
      case g:h=((b-r)/d+2)/6;break;
      case b:h=((r-g)/d+4)/6;break;
    }
  }
  return{h:h*360,s,v};
}

function hsvToHex(h,s,v){
  const f=(n,k=(n+h/60)%6)=>v-v*s*Math.max(Math.min(k,4-k,1),0);
  const r=Math.round(f(5)*255),g=Math.round(f(3)*255),b=Math.round(f(1)*255);
  return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
}
